server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Kong Admin API proxy
    # host.docker.internal resolves to the Windows/Mac host from inside Docker
    # so Kong running on localhost:8001 on your machine is reachable here
    location /kong-api/ {
        proxy_pass http://host.docker.internal:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        # Uncomment and set if your Kong Admin API requires an API key:
        # proxy_set_header apikey "your-api-key-here";
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

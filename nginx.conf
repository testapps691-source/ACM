server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Kong Admin API proxy — forwards /kong-api/* to your remote Kong instance
    location /kong-api/ {
        proxy_pass https://your-kong-admin.yourcompany.com:8444/;
        proxy_http_version 1.1;
        proxy_ssl_verify off;              # set to 'on' if Kong has a valid CA cert
        proxy_ssl_server_name on;          # required for SNI on HTTPS
        proxy_set_header Host your-kong-admin.yourcompany.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        # If your Kong Admin API requires an API key, add it here:
        # proxy_set_header apikey "your-kong-admin-token";
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
